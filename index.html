<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brain Blitz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🧠 Brain Blitz</h1>

<div class="stats">
<div>Score<br><span id="score">0</span></div>
<div>Combo<br><span id="combo">0</span></div>
<div>Level<br><span id="level">1</span></div>
</div>

<div class="timer">
<div id="timeBar"></div>
</div>

<div class="question" id="question">
Press Start
</div>

<input id="answer" type="number" placeholder="type answer">

<button id="startBtn">START GAME</button>

<div id="feedback"></div>

<h3>🏆 Leaderboard</h3>
<ol id="leaderboard"></ol>

<div class="credit">
Game by <b>Agus Satria Adhitama</b>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
